kind = "web"
previewPath = "/"
title = "MoneyQuest"
version = "1.0.0"
id = "artifacts/moneyquest"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 24386
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/moneyquest run dev"

[services.env]
PORT = "24386"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/moneyquest", "run", "build"]
publicDir = "artifacts/moneyquest/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
